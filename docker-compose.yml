services:
  client:
    # Tells Docker to build an image using the Dockerfile in ./client directory
    build: ./client
    ports:
     - "5173:5173"
    depends_on:
     - server
    env_file:
     - ./client/.env
    stdin_open: true
    tty: true

  server:
    build: ./server
    ports:
     - "3000:3000"
    env_file:
      - ./server/.env

